server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # MIME types explicites — .mjs doit être servi comme JavaScript
    # Sans ça, Firefox et Chrome bloquent le worker PDF.js silencieusement
    include /etc/nginx/mime.types;
    types {
        application/javascript  mjs;
    }

    # Compression gzip (inclut les fichiers .mjs)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long terme pour les assets hachés
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Le worker PDF.js — servi directement, jamais redirigé vers index.html
    location ~* \.m?js$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback — toutes les autres routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
